<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order List | Foodies</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* ── Order page layout ── */
        .order-summary-section {
            align-items: stretch;
        }

        /* ── Action buttons row ── */
        .action-buttons {
            display: flex;
            gap: 1rem;
            width: 100%;
            justify-content: flex-end;
        }

        .order-back-btn {
            background-color: transparent;
            color: #475569;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            padding: 14px 30px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
        }

        .order-back-btn:hover {
            border-color: #dc2626;
            color: #dc2626;
            background: #fff5f5;
        }

        .order-confirm-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            padding: 14px 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 200px;
            font-family: 'Poppins', sans-serif;
        }

        .order-confirm-btn:hover {
            background: #b91c1c;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(220, 38, 38, 0.3);
        }

        /* ── Payment section ── */
        .payment-section {
            width: 100%;
            margin-bottom: 2rem;
            padding: 1.5rem;
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            box-sizing: border-box;
        }

        .payment-section h3 {
            font-size: 1.1rem;
            color: #334155;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .payment-option {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .payment-option input[type="radio"] {
            width: 18px;
            height: 18px;
            accent-color: var(--primary-color);
            cursor: pointer;
        }

        .payment-option label {
            font-size: 1rem;
            color: #475569;
            cursor: pointer;
            font-weight: 500;
        }

        /* ── JS-rendered cart item elements ── */
        .order-item-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 8px;
        }

        .remove-item-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: #ef4444;
            padding: 5px;
            flex-shrink: 0;
        }

        .remove-item-btn:hover {
            color: #b91c1c;
        }

        .order-qty-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .qty-ctrl-btn {
            width: 28px;
            height: 28px;
            border-radius: 4px;
            border: 1px solid #cbd5e1;
            background: white;
            cursor: pointer;
            font-weight: bold;
            color: #334155;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .qty-ctrl-btn:hover {
            border-color: #dc2626;
            color: #dc2626;
        }

        .qty-value {
            font-weight: 600;
            min-width: 20px;
            text-align: center;
        }

        /* ── Address field ── */
        .address-field {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .address-field input {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid #e2e8f0;
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.95rem;
            color: #334155;
            background: white;
            outline: none;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
            box-sizing: border-box;
        }

        .address-field input:focus {
            border-color: #dc2626;
            box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.08);
        }

        .address-field input.error {
            border-color: #ef4444;
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.1);
        }

        .address-error {
            display: none;
            color: #ef4444;
            font-size: 0.82rem;
            margin: 2px 0 0;
        }

        .address-error.visible {
            display: block;
        }

        /* ── 768px — mobile ── */
        @media (max-width: 768px) {
            .action-buttons {
                flex-direction: column;
                justify-content: stretch;
            }

            .order-back-btn,
            .order-confirm-btn {
                width: 100%;
                min-width: unset;
                text-align: center;
            }

            .order-summary-section {
                padding: 0 1rem;
            }

            .payment-section {
                padding: 1.2rem;
            }

            .order-item-header {
                flex-wrap: nowrap;
            }
        }

        /* ── 480px — small phone ── */
        @media (max-width: 480px) {

            .order-back-btn,
            .order-confirm-btn {
                padding: 12px 20px;
                font-size: 0.95rem;
            }

            .payment-option label {
                font-size: 0.9rem;
            }

            .payment-section h3 {
                font-size: 1rem;
            }

            .order-item-title {
                font-size: 0.95rem;
            }

            .order-item-price {
                font-size: 1rem;
            }
        }
    </style>
</head>

<body>

                        </div>
                        <div class="order-item-divider"></div>
                        <div class="order-item-bottom">
                            <div class="order-item-price"><span>Rs.</span> 590</div>
                            <div class="order-item-qty">Qty : 2</div>
                        </div>
                    </div>
                </div>
            </div> <!-- /order-list -->

            <div class="order-summary-section">
                <!-- Delivery Address -->
                <div class="payment-section">
                    <h3>Delivery Address <span style="color:#dc2626;">*</span></h3>
                    <div class="address-field">
                        <input type="text" id="delivery-address" placeholder="House No., Street, City..."
                            autocomplete="street-address">
                        <p class="address-error" id="address-error">⚠ Please enter your delivery address.</p>
                    </div>

                </div>

                <!-- Payment methods -->
                <div class="payment-section">
                    <h3>Select Payment Method</h3>
                    <div class="payment-option">
                        <input type="radio" id="cash" name="payment_method" value="Cash on Delivery">
                        <label for="cash">Cash on Delivery</label>
                    </div>
                    <div class="payment-option">
                        <input type="radio" id="card" name="payment_method" value="Credit/Debit Card">
                        <label for="card">Credit / Debit Card</label>
                    </div>
                </div>

                <div class="order-total-display">
                    <span class="label">Total :</span>
                    <span class="amount" id="total-price">Rs. 0</span>
                </div>

                <div class="action-buttons">
                    <a href="menu.html" class="order-back-btn">Back to Menu</a>
                    <button class="order-confirm-btn" onclick="placeOrder()">Confirm</button>
                </div>
