<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order List | Foodies</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Framework Layout specific overrides for Order Page */
        body {
            background-color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 2%;
            min-height: 100vh;
        }

        .wrapper {
            width: 100%;
            max-width: 1100px;
            margin-top: 2rem;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Container for navbar + content */
        .main {
            background-color: #ffffff;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            display: flex;
            flex-direction: column;
            padding-bottom: 4rem;
        }

        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 2.5rem;
            background: white;
            border-bottom: 1px solid #f1f5f9;
        }

        .nav .nav-logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-color);
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        .nav .nav-logo span {
            color: var(--secondary-color);
        }

        .nav-links {
            display: flex;
            gap: 2.5rem;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-dark);
            font-size: 0.95rem;
            font-weight: 500;
            transition: var(--transition);
            position: relative;
        }

        .nav-links a.active {
            color: var(--primary-color);
            font-weight: 600;
        }

        /* Order Section Styles matching wireframe 4.0 */
        .order-header {
            padding: 4rem 2rem 2rem;
            text-align: center;
            position: relative;
        }

        .order-header h2 {
            display: inline-block;
            font-size: 1.8rem;
            color: #334155;
            font-weight: 600;
            position: relative;
        }

        .order-header h2::before,
        .order-header h2::after {
            content: "-";
            margin: 0 10px;
            color: var(--primary-color);
        }

        .order-list {
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            padding: 0 2rem;
        }

        .order-item-card {
            display: flex;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            overflow: hidden;
            background: white;
            transition: box-shadow 0.3s ease;
            height: 160px;
        }

        .order-item-card:hover {
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.06);
        }

        .order-item-img {
            width: 250px;
            background-color: #f8fafc;
            border-right: 1px solid #e2e8f0;
            position: relative;
            flex-shrink: 0;
        }

        .order-item-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Left accent line indicator from wireframe */
        .order-item-card::before {
            content: '';
            width: 6px;
            height: 100%;
            background-color: var(--primary-color);
            position: absolute;
            left: 0;
            top: 0;
            z-index: 2;
            opacity: 0.8;
        }

        .order-item-details {
            flex-grow: 1;
            padding: 1.5rem 2rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 12px;
        }

        .order-item-title {
            font-size: 1.1rem;
            color: #334155;
            font-weight: 700;
            margin: 0;
        }

        .order-item-stars {
            color: var(--secondary-color);
            font-size: 0.9rem;
            letter-spacing: 2px;
            display: flex;
            gap: 2px;
        }

        .order-item-stars svg {
            width: 14px;
            height: 14px;
            fill: currentColor;
        }

        .order-item-stars .star-empty {
            fill: #e2e8f0;
        }

        .order-item-divider {
            height: 1px;
            background-color: #e2e8f0;
            width: 100%;
            margin: 5px 0;
        }

        .order-item-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .order-item-price {
            font-size: 1.15rem;
            color: #334155;
            font-weight: 700;
        }

        .order-item-price span {
            font-size: 0.9rem;
            font-weight: 600;
            margin-right: 4px;
        }

        .order-item-qty {
            padding: 6px 15px;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            font-size: 0.85rem;
            color: #334155;
            font-weight: 500;
            background: white;
        }

        /* Summary Section */
        .order-summary-section {
            max-width: 800px;
            width: 100%;
            margin: 3rem auto 0;
            padding: 0 2rem;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .order-total-display {
            font-size: 1.4rem;
            color: #334155;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .order-total-display span.label {
            font-style: italic;
            color: #64748b;
            font-weight: 500;
        }

        .order-total-display span.amount {
            font-weight: 700;
        }

        .add-cart-btn {
            background-color: #334155;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 14px 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 250px;
        }

        .add-cart-btn:hover {
            background-color: var(--primary-color);
            box-shadow: 0 4px 15px rgba(255, 69, 0, 0.3);
            transform: translateY(-2px);
        }

        /* Checkout Form Extension */
        .checkout-wrapper {
            margin-top: 3rem;
            border-top: 1px dashed #cbd5e1;
            padding-top: 3rem;
            width: 100%;
            display: none;
            /* Hidden by default until JS renders cart contents */
        }

        /* Minimalist Footer */
        .footer {
            background: white;
            border-radius: 16px;
            padding: 1.5rem 2.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 1100px;
            box-sizing: border-box;
        }

        .footer p {
            font-size: 0.9rem;
            color: var(--text-light);
            margin: 0;
        }

        .socials {
            display: flex;
            gap: 1rem;
        }

        .socials a {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #f1f5f9;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-dark);
            transition: all 0.3s ease;
        }

        .socials a:hover {
            background: var(--primary-color);
            color: white;
            transform: translateY(-3px);
        }

        .socials svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        /* Hide the global navbar and footer */
        nav.navbar {
            display: none !important;
        }

        footer {
            display: none !important;
        }

        @media (max-width: 768px) {
            .nav {
                flex-direction: column;
                gap: 1rem;
            }

            .order-item-card {
                flex-direction: column;
                height: auto;
            }

            .order-item-img {
                width: 100%;
                height: 180px;
                border-right: none;
                border-bottom: 1px solid #e2e8f0;
            }

            .order-item-card::before {
                width: 100%;
                height: 4px;
            }

            .footer {
                flex-direction: column;
                gap: 1rem;
                text-align: center;
            }

            .order-summary-section {
                align-items: center;
            }

            .add-cart-btn {
                width: 100%;
            }
        }
    </style>
</head>

<body>

                </div>
            </div> <!-- /order-list -->

            <div class="order-summary-section">
                <!-- Payment methods added -->
                <div class="payment-methods-container" style="width: 100%; margin-bottom: 2rem; padding: 1.5rem; background-color: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; display: flex; flex-direction: column; gap: 1rem;">
                    <h3 style="font-size: 1.1rem; color: #334155; margin-bottom: 0.5rem;">Select Payment Method</h3>
                    <div class="payment-option" style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                        <input type="radio" id="cash" name="payment_method" value="Cash on Delivery" style="width: 18px; height: 18px; accent-color: var(--primary-color); cursor: pointer;">
                        <label for="cash" style="font-size: 1rem; color: #475569; cursor: pointer; font-weight: 500;">Cash on Delivery</label>
                    </div>
                    <div class="payment-option" style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                        <input type="radio" id="card" name="payment_method" value="Credit/Debit Card" style="width: 18px; height: 18px; accent-color: var(--primary-color); cursor: pointer;">
                        <label for="card" style="font-size: 1rem; color: #475569; cursor: pointer; font-weight: 500;">Credit / Debit Card</label>
                    </div>
                </div>

                <div class="order-total-display">
                    <span class="label">Total :</span>
                    <span class="amount" id="total-price">Rs. 0</span>
                </div>

                <div class="action-buttons" style="display: flex; gap: 1rem; width: 100%; justify-content: flex-end;">
                    <a href="menu.html" class="add-cart-btn" style="background-color: transparent; color: #475569; border: 1px solid #cbd5e1; text-align: center; text-decoration: none; display: inline-block;">Back to Menu</a>
                    <button class="place-order-btn" onclick="placeOrder()" style="background-color: var(--primary-color); color: white; border: none; border-radius: 6px; padding: 14px 40px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.3s ease; min-width: 200px;">Confirm</button>
