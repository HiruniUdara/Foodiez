<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order List | Foodies</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="wrapper">

        <div class="main">
            <!-- Centralized Navbar -->
            <nav class="navbar">
                <a href="index.html" class="nav-logo">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="var(--primary-color)">
                        <path
                            d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z" />
                    </svg>
                    Foodiez<span>.</span>
                </a>
                <div class="nav-links">
                    <a href="index.html">Home</a>
                    <a href="about.html">About Us</a>
                    <a href="menu.html">Menu</a>
                    <a href="order.html" class="active">Order</a>
                    <a href="contact.html">Contact</a>
                </div>
                <div class="menu-toggle">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </nav>

            <!-- Order Header -->
            <div class="order-header">
                <h2>Order List</h2>
            </div>

            <!-- Hardcoded items to match the wireframe exactly before JS intercepts -->
            <div id="order-container" class="order-list">

                <!-- Item 1 -->
                <div class="order-item-card" style="position:relative;">
                    <div class="order-item-img">
                        <img src="https://thebakeoneclub.co.uk/wp-content/uploads/2023/02/Spicy_Chicken_Pizza.jpg"
                            alt="Pizza">
                    </div>
                    <div class="order-item-details">
                        <h3 class="order-item-title">Chilli Chicken Pizza</h3>
                        <div class="order-item-stars">
                            <svg viewBox="0 0 24 24">
                                <path
                                    d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z" />
                            </svg>
                            <svg viewBox="0 0 24 24">
                                <path
                                    d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z" />
                            </svg>
                            <svg viewBox="0 0 24 24">
                                <path
                                    d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z" />
                            </svg>
                            <svg viewBox="0 0 24 24">
                                <path
                                    d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z" />
                            </svg>
                            <svg viewBox="0 0 24 24" class="star-empty">
                                <path
                                    d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21 12 17.27z" />
                            </svg>
                        </div>
                        <div class="order-item-divider"></div>
                        <div class="order-item-bottom">
                            <div class="order-item-price"><span>Rs.</span> 2900</div>
                            <div class="order-item-qty">Qty : 1</div>
                        </div>
                    </div>
                </div>

                <!-- Item 2 -->
                <div class="order-item-card" style="position:relative;">
                    <div class="order-item-img">
                        <img src="https://assets.epicurious.com/photos/5c745a108918ee7ab68daf79/1:1/w_2560%2Cc_limit/Smashburger-recipe-120219.jpg"
                            alt="Burger">
                    </div>
                    <div class="order-item-details">
                        <h3 class="order-item-title">Cheese Burger</h3>
                        <div class="order-item-stars">
                            <svg viewBox="0 0 24 24">
                                <path
                                    d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z" />
                            </svg>
                            <svg viewBox="0 0 24 24">
                                <path
                                    d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z" />
                            </svg>
                            <svg viewBox="0 0 24 24">
                                <path
                                    d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z" />
                            </svg>
                            <svg viewBox="0 0 24 24">
                                <path
                                    d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z" />
                            </svg>
                            <svg viewBox="0 0 24 24">
                                <path
                                    d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z" />
                            </svg>
                        </div>
                        <div class="order-item-divider"></div>
                        <div class="order-item-bottom">
                            <div class="order-item-price"><span>Rs.</span> 590</div>
                            <div class="order-item-qty">Qty : 2</div>
                        </div>
                    </div>
                </div>
            </div> <!-- /order-list -->

            <div class="order-summary-section">
                <!-- Payment methods added -->
                <div class="payment-methods-container"
                    style="width: 100%; margin-bottom: 2rem; padding: 1.5rem; background-color: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; display: flex; flex-direction: column; gap: 1rem;">
                    <h3 style="font-size: 1.1rem; color: #334155; margin-bottom: 0.5rem;">Select Payment Method</h3>
                    <div class="payment-option" style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                        <input type="radio" id="cash" name="payment_method" value="Cash on Delivery"
                            style="width: 18px; height: 18px; accent-color: var(--primary-color); cursor: pointer;">
                        <label for="cash"
                            style="font-size: 1rem; color: #475569; cursor: pointer; font-weight: 500;">Cash on
                            Delivery</label>
                    </div>
                    <div class="payment-option" style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                        <input type="radio" id="card" name="payment_method" value="Credit/Debit Card"
                            style="width: 18px; height: 18px; accent-color: var(--primary-color); cursor: pointer;">
                        <label for="card"
                            style="font-size: 1rem; color: #475569; cursor: pointer; font-weight: 500;">Credit / Debit
                            Card</label>
                    </div>
                </div>

                <div class="order-total-display">
                    <span class="label">Total :</span>
                    <span class="amount" id="total-price">Rs. 0</span>
                </div>

                <div class="action-buttons" style="display: flex; gap: 1rem; width: 100%; justify-content: flex-end;">
                    <a href="menu.html" class="add-cart-btn"
                        style="background-color: transparent; color: #475569; border: 1px solid #cbd5e1; text-align: center; text-decoration: none; display: inline-block;">Back
                        to Menu</a>
                    <button class="place-order-btn" onclick="placeOrder()"
                        style="background-color: var(--primary-color); color: white; border: none; border-radius: 6px; padding: 14px 40px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.3s ease; min-width: 200px;">Confirm</button>
                </div>
            </div>

        </div> <!-- /main -->

        <!-- Centralized Footer -->
        <footer>
            <p>&copy; 2026 <strong>Foodiez.</strong> All rights reserved.</p>

            <div class="socials">
                <a href="#" aria-label="Facebook">
                    <svg viewBox="0 0 24 24">
                        <path
                            d="M22 12c0-5.52-4.48-10-10-10S2 6.48 2 12c0 4.84 3.44 8.87 8 9.8V15H8v-3h2V9.5C10 7.57 11.57 6 13.5 6H16v3h-2c-1.1 0-2 .9-2 2v1h4l-1 3h-3v6.8c4.56-.93 8-4.96 8-9.8z" />
                    </svg>
                </a>
                <a href="#" aria-label="Instagram">
                    <svg viewBox="0 0 24 24">
                        <path
                            d="M7.8 2h8.4C19.4 2 22 4.6 22 7.8v8.4a5.8 5.8 0 0 1-5.8 5.8H7.8C4.6 22 2 19.4 2 16.2V7.8A5.8 5.8 0 0 1 7.8 2zm-.2 2A3.6 3.6 0 0 0 4 7.6v8.8C4 18.39 5.61 20 7.6 20h8.8a3.6 3.6 0 0 0 3.6-3.6V7.6C20 5.61 18.39 4 16.4 4H7.6zm9.65 1.5a1.25 1.25 0 0 1 1.25 1.25A1.25 1.25 0 0 1 17.25 8 1.25 1.25 0 0 1 16 6.75a1.25 1.25 0 0 1 1.25-1.25zM12 7a5 5 0 0 1 5 5 5 5 0 0 1-5 5 5 5 0 0 1-5-5 5 5 0 0 1 5-5zm0 2a3 3 0 0 0-3 3 3 3 0 0 0 3 3 3 3 0 0 0 3-3 3 3 0 0 0-3-3z" />
                    </svg>
                </a>
                <a href="#" aria-label="LinkedIn">
                    <svg viewBox="0 0 24 24">
                        <path
                            d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z" />
                    </svg>
                </a>
            </div>
        </footer>

    </div>

    <script src="script.js"></script>

</body>

</html>
