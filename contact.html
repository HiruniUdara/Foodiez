<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Foodies</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Framework Layout specific overrides for Contact Page */
        body {
            background-color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 2%;
            min-height: 100vh;
        }

        .wrapper {
            width: 100%;
            max-width: 1100px;
            margin-top: 2rem;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Container for navbar + content */
        .main {
            background-color: #ffffff;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            display: flex;
            flex-direction: column;
            padding-bottom: 2rem;
        }

        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 2.5rem;
            background: white;
            border-bottom: 1px solid #f1f5f9;
        }

        .nav .nav-logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-color);
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        .nav .nav-logo span {
            color: var(--secondary-color);
        }

        .nav-links {
            display: flex;
            gap: 2.5rem;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-dark);
            font-size: 0.95rem;
            font-weight: 500;
            transition: var(--transition);
            position: relative;
        }

        .nav-links a.active {
            color: var(--primary-color);
            font-weight: 600;
        }

        /* Contact Section Layout matching wireframe 5.0 */
        .contact-container {
            display: flex;
            flex-wrap: wrap;
        }

        .contact-left,
        .contact-right {
            flex: 1;
            min-width: 300px;
            padding: 4rem 3.5rem;
        }

        .section-title {
            font-size: 1.5rem;
            color: #334155;
            font-weight: 700;
            margin-bottom: 2.5rem;
        }

        .section-title::before {
            content: "- ";
            color: #334155;
        }

        .section-title::after {
            content: " -";
            color: #334155;
        }

        /* Contact Information Details */
        .contact-info-block {
            margin-bottom: 2rem;
        }

        .contact-info-block h4 {
            font-size: 1rem;
            color: #334155;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .contact-detail {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            color: #64748b;
            font-size: 0.9rem;
        }

        .contact-detail svg {
            width: 18px;
            height: 18px;
            fill: #94a3b8;
            margin-top: 2px;
        }

        /* Contact Form Styling */
        .contact-right {
            padding-top: 3rem;
            /* visually aligns form floating block with the left headers */
        }

        .contact-form-card {
            background-color: white;
            border-radius: 12px;
            padding: 2.5rem 2rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.06);
            border: 1px solid #f1f5f9;
        }

        .contact-form-card .section-title {
            margin-top: -4rem;
            /* pull up header so it aligns with wireframe */
            margin-bottom: 2rem;
            position: absolute;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: #475569;
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            padding: 14px 15px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 0.9rem;
            color: #334155;
            font-family: inherit;
            outline: none;
            transition: all 0.3s ease;
            background-color: white;
        }

        .form-input::placeholder {
            color: #94a3b8;
        }

        .form-input:focus {
            border-color: #3b82f6;
            /* Blue border focus to match wireframe btn */
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        textarea.form-input {
            resize: vertical;
            min-height: 120px;
        }

        .submit-btn {
            background-color: #3b82f6;
            /* Wireframe vibrant blue */
            color: white;
            border: none;
            padding: 12px 35px;
            font-size: 0.95rem;
            font-weight: 500;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 0.5rem;
        }

        .submit-btn:hover {
            background-color: #2563eb;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        /* Minimalist Footer */
        .footer {
            background: white;
            border-radius: 16px;
            padding: 1.5rem 2.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 2.5rem;
            margin-bottom: 3rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        .footer p {
            font-size: 0.9rem;
            color: var(--text-light);
            margin: 0;
        }

        .socials {
            display: flex;
            gap: 1rem;
        }

        .socials a {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #f1f5f9;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-dark);
            transition: all 0.3s ease;
        }

        .socials a:hover {
            background: var(--primary-color);
            color: white;
            transform: translateY(-3px);
        }

        .socials svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        /* Hide the global navbar and footer */
        nav.navbar {
            display: none !important;
        }

        footer {
            display: none !important;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .contact-container {
                flex-direction: column;
            }

            .contact-right {
                padding-top: 0;
                padding-left: 3.5rem;
            }

            .contact-form-card .section-title {
                position: relative;
                margin-top: 0;
            }
        }

        @media (max-width: 768px) {
            .nav {
                flex-direction: column;
                gap: 1rem;
            }

            .contact-left,
            .contact-right {
                padding: 2.5rem 1.5rem;
            }

            .footer {
                flex-direction: column;
                gap: 1rem;
                text-align: center;
            }
        }
    </style>
</head>

                <!-- Right: Contact Form -->
                <div class="contact-right" style="position:relative;">
                    <h2 class="section-title" style="visibility:hidden">Contact Form</h2>
                    <!-- Spacer for responsive flow -->

                    <form class="contact-form-card" id="contact-form">
                        <h2 class="section-title" style="margin-top: -6rem; margin-bottom:2.5rem">Contact Form</h2>

                        <div class="form-group">
                            <label class="form-label">Name</label>
                            <input type="text" class="form-input" placeholder="Your Name" required>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Phone</label>
                            <input type="tel" class="form-input" placeholder="Your Phone Number" required>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-input" placeholder="Your Email" required>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Address</label>
                            <input type="text" class="form-input" placeholder="Your Address">
                        </div>

                        <div class="form-group">
                            <label class="form-label">Message</label>
                            <textarea class="form-input" placeholder="Your Message..." required></textarea>
                        </div>

                        <button type="submit" class="submit-btn"
                            style="background-color: #3b82f6; border-radius: 4px;">Submit</button>
                    </form>
                </div>

            </div> <!-- /contact-container -->
        </div> <!-- /main -->
